        theme: { type: string }
        pillar: { $ref: "#/components/schemas/Pillar" }
        prompt: { type: string }
        benefit: { type: string }
        active: { type: boolean }
    CohortStat:
      type: object
      required: [id, name, enrolled, avgProgress, completionRate, engagement]
      properties:
        id: { type: string }
        name: { type: string }
        enrolled: { type: integer }
        avgProgress: { type: integer }
        completionRate: { type: integer }
        engagement: { type: integer }
    CompanyStat:
      type: object
      required: [id, name, participants, avg]
      properties:
        id: { type: string }
        name: { type: string }
        participants: { type: integer }
        avg: { type: integer }
    AnalyticsData:
      type: object
      required: [cohortStats, companyStats]
      properties:
        cohortStats:
          type: array
          items: { $ref: "#/components/schemas/CohortStat" }
        companyStats:
          type: array
          items: { $ref: "#/components/schemas/CompanyStat" }

    CompanyEnrollmentRow:
      type: object
      required: [id, userEmail, cohortName, completedCount, status]
      properties:
        id: { type: string }
        userName: { type: string, nullable: true }
        userEmail: { type: string }
        cohortName: { type: string }
        completedCount: { type: integer }
        totalCount: { type: integer }
        status: { type: string }
    CompanyOverview:
      type: object
      required: [company, enrollments]
      properties:
        company:
          oneOf: [{ $ref: "#/components/schemas/CompanyLite" }, { type: "null" }]
        enrollments:
          type: array
          items: { $ref: "#/components/schemas/CompanyEnrollmentRow" }
    CompanyPersonEnrollment:
      type: object
      required: [cohortName, completedCount, status]
      properties:
        cohortName: { type: string }
        completedCount: { type: integer }
        totalCount: { type: integer }
        status: { type: string }
    CompanyPersonRow:
      type: object
      required: [id, email, enrollments]
      properties:
        id: { type: string }
        name: { type: string, nullable: true }
        email: { type: string }
        enrollments:
          type: array
          items: { $ref: "#/components/schemas/CompanyPersonEnrollment" }
    PublicSection:
      type: object
      required: [key, content]
      properties:
        key: { type: string }
        content: { type: object, additionalProperties: true }
    PublicContent:
      type: object
      required: [sections]
      properties:
        sections:
          type: array
          items: { $ref: "#/components/schemas/PublicSection" }
    AdminSection:
      type: object
      required: [key, page, group, label, description, core, order, visible, fields, content]
      properties:
        key: { type: string }
        page: { type: string }
        group: { type: string }
        label: { type: string }
        description: { type: string }
        core: { type: boolean }
        order: { type: integer }
        visible: { type: boolean }
        fields:
          type: array
          items: { type: object, additionalProperties: true }
        content: { type: object, additionalProperties: true }
    AdminContent:
      type: object
      required: [sections]
      properties:
        sections:
          type: array
          items: { $ref: "#/components/schemas/AdminSection" }
    UpdateSectionRequest:
      type: object
      required: [content]
      properties:
        content: { type: object, additionalProperties: true }
    SetVisibilityRequest:
      type: object
      required: [visible]
      properties:
        visible: { type: boolean }
    ReorderSectionRequest:
      type: object
      required: [direction]
      properties:
        direction: { type: string, enum: [up, down] }
    UploadImageRequest:
      type: object
      required: [contentType, dataBase64]
      properties:
        contentType: { type: string }
        dataBase64: { type: string }
    UploadImageResult:
      type: object
      required: [url]
      properties:
        url: { type: string }
