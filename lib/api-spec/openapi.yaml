openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: TLC platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: session
  - name: assessment
  - name: enrollment
  - name: portal
  - name: progress
  - name: chat
  - name: notifications
  - name: account
  - name: coaching
  - name: billing
  - name: email
  - name: fulfillment
  - name: trainer
  - name: admin
  - name: company
  - name: public

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema: { $ref: "#/components/schemas/HealthStatus" }

  # ---------------------------------------------------------------- session
  /session/login:
    post:
      operationId: login
      tags: [session]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LoginRequest" }
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LoginResponse" }
  /session/logout:
    post:
      operationId: logout
      tags: [session]
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Ok" }
  /me:
    get:
      operationId: getMe
      tags: [session]
      responses:
        "200":
          description: Current user context
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MeResponse" }

  # ------------------------------------------------------------- assessment
  /assessment:
    get:
      operationId: getAssessment
      tags: [assessment]
      responses:
        "200":
          description: Public assessment
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AssessmentPublic" }
  /assessment/submit:
    post:
      operationId: submitAssessment
      tags: [assessment]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SubmitAssessmentRequest" }
      responses:
        "200":
          description: Snapshot
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SubmitAssessmentResponse" }

  # ------------------------------------------------------------- enrollment
  /enroll/options:
    get:
      operationId: getEnrollOptions
      tags: [enrollment]
      responses:
        "200":
          description: Enroll options
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EnrollOptions" }
  /cohorts/upcoming:
    get:
      operationId: getUpcomingCohorts
      tags: [enrollment]
      responses:
        "200":
          description: Public upcoming cohorts
          content:
            application/json:
              schema: { $ref: "#/components/schemas/UpcomingCohorts" }
  /enrollments:
    post:
      operationId: createEnrollment
      tags: [enrollment]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateEnrollmentRequest" }
      responses:
        "200":
          description: Enrollment result
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EnrollResult" }
  /enrollments/{id}/fulfill:
    post:
      operationId: fulfillEnrollment
      tags: [fulfillment]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: "#/components/schemas/FulfillRequest" }
      responses:
        "200":
          description: Fulfilled
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Ok" }
  # ------------------------------------------------------------------ portal
  /portal/context:
    get:
      operationId: getParticipantContext
      tags: [portal]
      responses:
        "200":
          description: Participant context (or null when no active enrollment)
          content:
            application/json:
              schema:
                oneOf:
                  - { $ref: "#/components/schemas/ParticipantContext" }
                  - { type: "null" }
  /portal/materials:
    get:
      operationId: getPortalMaterials
      tags: [portal]
      responses:
        "200":
          description: Published materials for the participant
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/ResourceItem" }
  /portal/library:
    get:
      operationId: getPortalLibrary
      tags: [portal]
      responses:
        "200":
          description: Resource library
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LibraryResponse" }
  /portal/home:
    get:
      operationId: getPortalHome
      tags: [portal]
      parameters:
        # Dev/demo override for the derived state, mirroring the old ?phase= toggle.
        - { name: preview, in: query, required: false, schema: { type: string } }
      responses:
        "200":
          description: Home screen state (or null when no active enrollment)
          content:
            application/json:
              schema:
                oneOf:
                  - { $ref: "#/components/schemas/PortalHomeState" }
                  - { type: "null" }
  /portal/reflections:
    get:
      operationId: listMyReflections
      tags: [portal]
      responses:
        "200":
          description: Everything the participant has written (self only)
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/ReflectionItem" }
    post:
      operationId: createReflection
      tags: [portal]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateReflectionRequest" }
      responses:
        "200":
          description: Saved (append-only; a new version row)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ReflectionItem" }
  /portal/live-it/{itemId}/check:
    post:
      operationId: checkLiveItItem
      tags: [portal]
      parameters:
        - { name: itemId, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CheckLiveItRequest" }
      responses:
        "200":
          description: Lived it
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Ok" }
  /portal/live-it/{itemId}/uncheck:
    post:
      operationId: uncheckLiveItItem
      tags: [portal]
      parameters:
        - { name: itemId, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Unchecked
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Ok" }
  /portal/partner:
    get:
      operationId: getMyPartner
      tags: [portal]
      responses:
        "200":
          description: Partner presence (or null when unpartnered)
          content:
            application/json:
              schema:
                oneOf:
                  - { $ref: "#/components/schemas/PartnerState" }
                  - { type: "null" }
    post:
      operationId: choosePartner
      tags: [portal]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ChoosePartnerRequest" }
      responses:
        "200":
          description: Partner linked
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Ok" }
  /portal/partner/candidates:
    get:
      operationId: listPartnerCandidates
      tags: [portal]
      responses:
        "200":
          description: Unpartnered cohort peers (names only)
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/PartnerCandidate" }
  /portal/partner/note:
    post:
      operationId: sendPartnerNote
      tags: [portal]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SendMessageRequest" }
      responses:
        "200":
          description: Note sent (via the partners' direct thread)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PartnerNoteResult" }
  /portal/shipment/request:
    post:
      operationId: requestPrintedWorkbook
      tags: [portal]
      responses:
        "200":
          description: Print request outcome (honors the mailing lead-time cutoff)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PrintRequestResult" }
  /portal/export:
    get:
      operationId: getPortalExport
      tags: [portal]
      responses:
        "200":
          description: Everything the participant wrote, bundled for download
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PortalExport" }

  # -------------------------------------------------------------------- chat
  /chat/threads:
    get:
      operationId: listThreads
      tags: [chat]
      responses:
        "200":
          description: Threads
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/ThreadSummary" }
  /chat/unread-count:
    get:
      operationId: getUnreadMessageCount
      tags: [chat]
      responses:
        "200":
          description: Unread message count
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CountResponse" }
  /chat/threads/{id}:
    get:
      operationId: getThread
      tags: [chat]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
        - { name: oversight, in: query, required: false, schema: { type: boolean } }
      responses:
        "200":
          description: Thread detail (or null)
          content:
            application/json:
              schema:
                oneOf:
                  - { $ref: "#/components/schemas/ThreadDetail" }
                  - { type: "null" }
  /chat/threads/{id}/messages:
    post:
      operationId: sendMessage
      tags: [chat]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SendMessageRequest" }
      responses:
        "200":
          description: Sent
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SendMessageResult" }
  /chat/threads/{id}/read:
    post:
      operationId: markThreadRead
      tags: [chat]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Marked read
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Ok" }

  # ----------------------------------------------------------- notifications
  /notifications:
    get:
      operationId: listNotifications
      tags: [notifications]
      responses:
        "200":
          description: Recent notifications
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/NotificationItem" }
  /notifications/read-all:
    post:
      operationId: markAllNotificationsRead
      tags: [notifications]
      responses:
        "200":
          description: Marked all read
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Ok" }

  # ----------------------------------------------------------------- account
  /account/settings:
    get:
      operationId: getAccountSettings
      tags: [account]
      responses:
        "200":
          description: Account settings
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AccountSettings" }
  /account/consent:
    post:
      operationId: setConsent
      tags: [account]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SetConsentRequest" }
      responses:
        "200":
          description: Consent recorded
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Ok" }
  /account/deletion-request:
    post:
      operationId: requestAccountDeletion
      tags: [account]
      responses:
        "200":
          description: Deletion requested
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Ok" }

  # ---------------------------------------------------------------- coaching
  /coaching/slots:
    get:
      operationId: getCoachingSlots
      tags: [coaching]
      responses:
        "200":
          description: Bookable Intersession coaching slots for the participant
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CoachingSlotsResponse" }
  /coaching/bookings:
    post:
      operationId: bookCoachingSession
      tags: [coaching]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/BookCoachingRequest" }
      responses:
        "200":
          description: Booked
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BookingItem" }
  /coaching/bookings/{id}/reschedule:
    post:
      operationId: rescheduleBooking
      tags: [coaching]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RescheduleRequest" }
      responses:
        "200":
          description: Rescheduled
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ActionResult" }

  # ----------------------------------------------------------------- billing
  /admin/payments:
    get:
      operationId: listPayments
      tags: [billing]
      responses:
        "200":
          description: Payments
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/BillingPayment" }
  /admin/payments/{id}/refund:
    post:
      operationId: refundPayment
      tags: [billing]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RefundRequest" }
      responses:
        "200":
          description: Refunded
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ActionResult" }

  # ------------------------------------------------------------------- email
  /admin/communications:
    get:
      operationId: getCommunications
      tags: [email]
      responses:
        "200":
          description: Communications data
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CommunicationsData" }
  /admin/email/campaigns:
    post:
      operationId: sendCampaign
      tags: [email]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SendCampaignRequest" }
      responses:
        "200":
          description: Campaign result
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SendCampaignResult" }

  # ----------------------------------------------------------------- trainer
  /trainer/overview:
    get:
      operationId: getTrainerOverview
      tags: [trainer]
      responses:
        "200":
          description: Trainer overview
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TrainerOverview" }
  /trainer/participants:
    get:
      operationId: listTrainerParticipants
      tags: [trainer]
      responses:
        "200":
          description: Trainer participants
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/TrainerParticipantRow" }
  /trainer/participants/{id}:
    get:
      operationId: getTrainerParticipant
      tags: [trainer]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Trainer participant detail (or null)
          content:
            application/json:
              schema:
                oneOf:
                  - { $ref: "#/components/schemas/TrainerParticipantDetail" }
                  - { type: "null" }
  /trainer/events:
    get:
      operationId: getTrainerEventsData
      tags: [trainer]
      responses:
        "200":
          description: Trainer events data
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TrainerEventsData" }
    post:
      operationId: createEvent
      tags: [trainer]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateEventRequest" }
      responses:
        "200":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/IdResult" }
  /trainer/resources:
    get:
      operationId: getTrainerResourcesData
      tags: [trainer]
      responses:
        "200":
          description: Trainer resources data
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TrainerResourcesData" }
    post:
      operationId: createResource
      tags: [trainer]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateResourceRequest" }
      responses:
        "200":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/IdResult" }
  /trainer/resources/{id}/status:
    post:
      operationId: setResourceStatus
      tags: [trainer]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SetResourceStatusRequest" }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Ok" }
  /trainer/enrollments/{id}/certificate:
    post:
      operationId: issueCertificate
      tags: [trainer]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Certificate result
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CertificateResult" }

  # ------------------------------------------------------------------- admin
  /admin/overview:
    get:
      operationId: getAdminOverview
      tags: [admin]
      responses:
        "200":
          description: Admin overview
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AdminOverview" }
  /admin/companies:
    get:
      operationId: getCompaniesData
      tags: [admin]
      responses:
        "200":
          description: Companies data
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CompaniesData" }
    post:
      operationId: createCompany
      tags: [admin]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateCompanyRequest" }
      responses:
        "200":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/IdResult" }
  /admin/seats:
    post:
      operationId: purchaseSeats
      tags: [admin]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PurchaseSeatsRequest" }
      responses:
        "200":
          description: Purchased
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Ok" }
  /admin/cohorts:
    get:
      operationId: listCohorts
      tags: [admin]
      responses:
        "200":
          description: Cohorts
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/AdminCohortRow" }
    post:
      operationId: createCohort
      tags: [admin]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateCohortRequest" }
      responses:
        "200":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/IdResult" }
  /admin/cohorts/options:
    get:
      operationId: getCohortFormOptions
      tags: [admin]
      responses:
        "200":
          description: Programs, trainers, and companies for the cohort form
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CohortFormOptions" }
  /admin/cohorts/{id}:
    patch:
      operationId: updateCohort
      tags: [admin]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateCohortRequest" }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Ok" }
    delete:
      operationId: deleteCohort
      tags: [admin]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Ok" }
        "409":
          description: Cohort has enrollments — archive instead
          content:
            application/json:
              schema:
                type: object
                required: [error]
                properties:
                  error: { type: string }
  /cohorts/{slug}:
    get:
      operationId: getPublicCohort
      tags: [public]
      parameters:
        - { name: slug, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: A single cohort's public landing detail
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PublicCohort" }
        "404":
          description: Not found
  /admin/cohorts/clone:
    post:
      operationId: cloneCohort
      tags: [admin]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CloneCohortRequest" }
      responses:
        "200":
          description: Cloned
          content:
            application/json:
              schema: { $ref: "#/components/schemas/IdResult" }
  /admin/participants:
    get:
      operationId: listParticipants
      tags: [admin]
      responses:
        "200":
          description: Participants
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/AdminParticipantRow" }
  /admin/trainers:
    get:
      operationId: listTrainers
      tags: [admin]
      responses:
        "200":
          description: Trainers
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/AdminTrainerRow" }
  /admin/resources:
    get:
      operationId: getAdminResourcesData
      tags: [admin]
      responses:
        "200":
          description: Resources & events
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AdminResourcesData" }
  /admin/assessment:
    get:
      operationId: getAdminAssessment
      tags: [assessment]
      responses:
        "200":
          description: Admin assessment
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AdminAssessment" }
  /admin/assessment/questions:
    post:
      operationId: addQuestion
      tags: [assessment]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AddQuestionRequest" }
      responses:
        "200":
          description: Added
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Ok" }
  /admin/assessment/questions/{id}:
    post:
      operationId: updateQuestion
      tags: [assessment]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateQuestionRequest" }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Ok" }
    delete:
      operationId: deleteQuestion
      tags: [assessment]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Ok" }
  /admin/analytics:
    get:
      operationId: getAnalytics
      tags: [admin]
      responses:
        "200":
          description: Analytics
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AnalyticsData" }

  # ------------------------------------------------------------- admin users
  /admin/users:
    get:
      operationId: listUsers
      tags: [admin]
      responses:
        "200":
          description: Users
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/AdminUserRow" }
    post:
      operationId: createUser
      tags: [admin]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateUserRequest" }
      responses:
        "200":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/InviteResult" }
  /admin/users/{id}:
    patch:
      operationId: updateUser
      tags: [admin]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateUserRequest" }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Ok" }
    delete:
      operationId: deleteUser
      tags: [admin]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Ok" }
  /admin/users/{id}/invite:
    post:
      operationId: regenerateInvite
      tags: [admin]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Invite issued
          content:
            application/json:
              schema: { $ref: "#/components/schemas/InviteResult" }
  /invite/{token}:
    get:
      operationId: getInvite
      tags: [session]
      parameters:
        - { name: token, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Invite info
          content:
            application/json:
              schema: { $ref: "#/components/schemas/InviteInfo" }
  /invite/{token}/accept:
    post:
      operationId: acceptInvite
      tags: [session]
      parameters:
        - { name: token, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AcceptInviteRequest" }
      responses:
        "200":
          description: Accepted
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Ok" }

  # ----------------------------------------------------------------- company
  /company/overview:
    get:
      operationId: getCompanyOverview
      tags: [company]
      responses:
        "200":
          description: Company overview
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CompanyOverview" }
  /company/people:
    get:
      operationId: listCompanyPeople
      tags: [company]
      responses:
        "200":
          description: Company people
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/CompanyPersonRow" }

  /content/page/{page}:
    get:
      operationId: getPublicContent
      tags: [content]
      parameters:
        - { name: page, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Visible sections for a public page (plus globals)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PublicContent" }

  /content/images/{id}:
    get:
      operationId: getContentImage
      tags: [content]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: An admin-uploaded image stored in the database
          content:
            image/*:
              schema: { type: string, format: binary }

  /admin/content:
    get:
      operationId: getAdminContent
      tags: [content]
      responses:
        "200":
          description: All editable sections with field descriptors
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AdminContent" }

  /admin/content/sections/{key}:
    post:
      operationId: updateSectionContent
      tags: [content]
      parameters:
        - { name: key, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateSectionRequest" }
      responses:
        "200":
          description: Saved
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Ok" }

  /admin/content/sections/{key}/visibility:
    post:
      operationId: setSectionVisibility
      tags: [content]
      parameters:
        - { name: key, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SetVisibilityRequest" }
      responses:
        "200":
          description: Toggled
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Ok" }

  /admin/content/sections/{key}/reorder:
    post:
      operationId: reorderSection
      tags: [content]
      parameters:
        - { name: key, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ReorderSectionRequest" }
      responses:
        "200":
          description: Reordered
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Ok" }

  /admin/content/sections/{key}/reset:
    post:
      operationId: resetSection
      tags: [content]
      parameters:
        - { name: key, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Reset to original
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Ok" }

  /admin/content/upload:
    post:
      operationId: uploadContentImage
      tags: [content]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UploadImageRequest" }
      responses:
        "200":
          description: Uploaded
          content:
            application/json:
              schema: { $ref: "#/components/schemas/UploadImageResult" }

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status: { type: string }
    Ok:
      type: object
      required: [ok]
      properties:
        ok: { type: boolean }
    ActionResult:
      type: object
      required: [ok]
      properties:
        ok: { type: boolean }
        error: { type: string }
    CountResponse:
      type: object
      required: [count]
      properties:
        count: { type: integer }
    IdResult:
      type: object
      required: [ok, id]
      properties:
        ok: { type: boolean }
        id: { type: string }

    Role:
      type: string
      enum: [PARTICIPANT, COMPANY_VIEWER, TRAINER, ADMIN, SUPER_ADMIN]

    SessionUser:
      type: object
      required: [id, role, companyId, name, email]
      properties:
        id: { type: string }
        role: { $ref: "#/components/schemas/Role" }
        companyId: { type: string, nullable: true }
        name: { type: string, nullable: true }
        email: { type: string }
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string }
        password: { type: string }
    LoginResponse:
      type: object
      required: [token, user]
      properties:
        token: { type: string }
        user: { $ref: "#/components/schemas/SessionUser" }
    CompanyLite:
      type: object
      required: [id, name]
      properties:
        id: { type: string }
        name: { type: string }
    MeResponse:
      type: object
      required: [id, email, role]
      properties:
        id: { type: string }
        name: { type: string, nullable: true }
        email: { type: string }
        role: { $ref: "#/components/schemas/Role" }
        title: { type: string, nullable: true }
        status: { type: string, nullable: true }
        companyId: { type: string, nullable: true }
        company:
          oneOf: [{ $ref: "#/components/schemas/CompanyLite" }, { type: "null" }]
        primaryCohortName: { type: string, nullable: true }

    UserLite:
      type: object
      required: [id, email]
      properties:
        id: { type: string }
        name: { type: string, nullable: true }
        email: { type: string }
        image: { type: string, nullable: true }
        title: { type: string, nullable: true }

    Pillar:
      type: string
      enum: [EQ, IQ, MQ]
    QuestionPublic:
      type: object
      required: [id, theme, pillar, prompt, benefit]
      properties:
        id: { type: string }
        theme: { type: string }
        pillar: { $ref: "#/components/schemas/Pillar" }
        color: { type: string, nullable: true }
        prompt: { type: string }
        benefit: { type: string }
    Question:
      allOf:
        - $ref: "#/components/schemas/QuestionPublic"
        - type: object
          required: [order, active]
          properties:
            order: { type: integer }
            active: { type: boolean }
    AssessmentPublic:
      type: object
      required: [id, title, questions]
      properties:
        id: { type: string }
        title: { type: string }
        questions:
          type: array
          items: { $ref: "#/components/schemas/QuestionPublic" }
    GrowthCard:
      type: object
      required: [theme, benefit, pillar, color]
      properties:
        theme: { type: string }
        benefit: { type: string }
        pillar: { type: string }
        color: { type: string }
    Snapshot:
      type: object
      required: [growth, strengths]
      properties:
        growth:
          type: array
          items: { $ref: "#/components/schemas/GrowthCard" }
        strengths:
          type: array
          items: { type: string }
    SubmitAssessmentRequest:
      type: object
      required: [answers]
      properties:
        answers:
          type: object
          additionalProperties: { type: integer }
        leadEmail: { type: string }
        leadName: { type: string }
    SubmitAssessmentResponse:
      type: object
      required: [responseId, snapshot]
      properties:
        responseId: { type: string }
        snapshot: { $ref: "#/components/schemas/Snapshot" }

    EnrollCohortOption:
      type: object
      required: [id, name, price, currency, seatsLeft, status]
      properties:
        id: { type: string }
        name: { type: string }
        price: { type: integer }
        currency: { type: string }
        seatsLeft: { type: integer, nullable: true }
        status: { type: string }
    EnrollOptions:
      type: object
      required: [cohorts, companies]
      properties:
        cohorts:
          type: array
          items: { $ref: "#/components/schemas/EnrollCohortOption" }
        companies:
          type: array
          items: { $ref: "#/components/schemas/CompanyLite" }
    UpcomingCohort:
      type: object
      required: [id, name, slug, startDate, endDate, price, currency, seatsLeft, status]
      properties:
        id: { type: string }
        name: { type: string }
        slug: { type: string }
        startDate: { type: string, format: date-time }
        endDate: { type: string, format: date-time }
        sessionDay: { type: string, nullable: true }
        sessionTime: { type: string, nullable: true }
        timezone: { type: string, nullable: true }
        price: { type: integer }
        currency: { type: string }
        seatsLeft: { type: integer, nullable: true }
        status: { type: string }
    UpcomingCohorts:
      type: object
      required: [cohorts]
      properties:
        cohorts:
          type: array
          items: { $ref: "#/components/schemas/UpcomingCohort" }
    ShippingAddress:
      type: object
      required: [line1, city, state, postal]
      properties:
        line1: { type: string }
        line2: { type: string }
        city: { type: string }
        state: { type: string }
        postal: { type: string }
        country: { type: string }
    CreateEnrollmentRequest:
      type: object
      required: [name, email, cohortId, shipping]
      properties:
        name: { type: string }
        email: { type: string }
        companyId: { type: string }
        cohortId: { type: string }
        responseId: { type: string }
        coupon: { type: string }
        shipping: { $ref: "#/components/schemas/ShippingAddress" }
    EnrollResult:
      type: object
      required: [ok]
      properties:
        ok: { type: boolean }
        status: { type: string, enum: [ENROLLED, WAITLISTED] }
        enrollmentId: { type: string }
        error: { type: string }
    FulfillRequest:
      type: object
      properties:
        externalId: { type: string }
        processor: { type: string, enum: [STRIPE, THRIVECART, MANUAL] }
        amount: { type: integer }
    ModuleLite:
      type: object
      required: [id, title, pillar]
      properties:
        id: { type: string }
        title: { type: string }
        pillar: { $ref: "#/components/schemas/Pillar" }
        order: { type: integer }
        weekNo: { type: integer, nullable: true }
        segment: { type: string, nullable: true }
        lessonWeekNo: { type: integer, nullable: true }
        practiceWeekNo: { type: integer, nullable: true }
        summary: { type: string, nullable: true }
        anchorLine: { type: string, nullable: true }
        programId: { type: string }
    EventLite:
      type: object
      required: [id, cohortId, type, title, startAt, endAt]
      properties:
        id: { type: string }
        cohortId: { type: string }
        moduleId: { type: string, nullable: true }
        type: { type: string }
        title: { type: string }
        startAt: { type: string, format: date-time }
        endAt: { type: string, format: date-time }
        joinUrl: { type: string, nullable: true }
        location: { type: string, nullable: true }
        status: { type: string }
        weekNo: { type: integer, nullable: true }
    ProgramLite:
      type: object
      required: [id, name, slug, modules]
      properties:
        id: { type: string }
        name: { type: string }
        slug: { type: string }
        modules:
          type: array
          items: { $ref: "#/components/schemas/ModuleLite" }
    CohortContext:
      type: object
      required: [id, name, startDate, endDate, price, currency, capacity, status, isPrivate, programId, program, events]
      properties:
        id: { type: string }
        name: { type: string }
        slug: { type: string }
        startDate: { type: string, format: date-time }
        endDate: { type: string, format: date-time }
        sessionDay: { type: string, nullable: true }
        sessionTime: { type: string, nullable: true }
        timezone: { type: string, nullable: true }
        price: { type: integer }
        currency: { type: string }
        capacity: { type: integer }
        status: { type: string }
        isPrivate: { type: boolean }
        programId: { type: string }
        welcomeNote: { type: string, nullable: true }
        portalClosesAt: { type: string, format: date-time, nullable: true }
        program: { $ref: "#/components/schemas/ProgramLite" }
        trainer:
          oneOf: [{ $ref: "#/components/schemas/UserLite" }, { type: "null" }]
        events:
          type: array
          items: { $ref: "#/components/schemas/EventLite" }
    ShipmentLite:
      type: object
      required: [id, status]
      properties:
        id: { type: string }
        status: { type: string }
        carrier: { type: string, nullable: true }
        tracking: { type: string, nullable: true }
        requestedAt: { type: string, format: date-time, nullable: true }
    ModuleProgressItem:
      type: object
      required: [id, enrollmentId, weekNo, status]
      properties:
        id: { type: string }
        enrollmentId: { type: string }
        weekNo: { type: integer }
        moduleId: { type: string, nullable: true }
        status: { type: string }
        completedAt: { type: string, format: date-time, nullable: true }
        module:
          oneOf: [{ $ref: "#/components/schemas/ModuleLite" }, { type: "null" }]
    BookingItem:
      type: object
      required: [id, slot, status]
      properties:
        id: { type: string }
        slot: { type: string, format: date-time }
        status: { type: string }
        sequence: { type: integer, nullable: true }
        trainer:
          oneOf: [{ $ref: "#/components/schemas/UserLite" }, { type: "null" }]
    CertificateLite:
      type: object
      required: [id, serial, issuedAt]
      properties:
        id: { type: string }
        serial: { type: string }
        issuedAt: { type: string, format: date-time }
    ParticipantContext:
      type: object
      required: [id, userId, cohortId, status, user, cohort, moduleProgress, bookings]
      properties:
        id: { type: string }
        userId: { type: string }
        cohortId: { type: string }
        companyId: { type: string, nullable: true }
        status: { type: string }
        shippingAddress: { type: object, additionalProperties: true, nullable: true }
        enrolledAt: { type: string, format: date-time, nullable: true }
        completedAt: { type: string, format: date-time, nullable: true }
        user: { $ref: "#/components/schemas/UserLite" }
        cohort: { $ref: "#/components/schemas/CohortContext" }
        shipment:
          oneOf: [{ $ref: "#/components/schemas/ShipmentLite" }, { type: "null" }]
        moduleProgress:
          type: array
          items: { $ref: "#/components/schemas/ModuleProgressItem" }
        bookings:
          type: array
          items: { $ref: "#/components/schemas/BookingItem" }
        certificate:
          oneOf: [{ $ref: "#/components/schemas/CertificateLite" }, { type: "null" }]
    ResourceItem:
      type: object
      required: [id, title, type, status, printReady]
      properties:
        id: { type: string }
        title: { type: string }
        type: { type: string }
        status: { type: string }
        fileKey: { type: string, nullable: true }
        url: { type: string, nullable: true }
        description: { type: string, nullable: true }
        printReady: { type: boolean }
        moduleId: { type: string, nullable: true }
        cohortId: { type: string, nullable: true }
        programId: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }
        module:
          oneOf: [{ $ref: "#/components/schemas/ModuleLite" }, { type: "null" }]
    LibraryResponse:
      type: object
      required: [modules, resources]
      properties:
        modules:
          type: array
          items: { $ref: "#/components/schemas/ModuleLite" }
        resources:
          type: array
          items: { $ref: "#/components/schemas/ResourceItem" }

    # ---------------------------------------------------- portal home screen
    ReflectionKind:
      type: string
      enum: [SEED, I_AM, LEADERSHIP_WHY, COMMITMENT, MODULE_CLOSING, MONDAY_MORNING]
    ReflectionItem:
      type: object
      required: [id, kind, body, createdAt]
      properties:
        id: { type: string }
        kind: { $ref: "#/components/schemas/ReflectionKind" }
        promptKey: { type: string, nullable: true }
        moduleId: { type: string, nullable: true }
        moduleTitle: { type: string, nullable: true }
        body: { type: string }
        createdAt: { type: string, format: date-time }
    CreateReflectionRequest:
      type: object
      required: [kind, body]
      properties:
        kind: { $ref: "#/components/schemas/ReflectionKind" }
        promptKey: { type: string, nullable: true }
        moduleId: { type: string, nullable: true }
        body: { type: string, minLength: 1, maxLength: 4000 }
    PortalAnchor:
      type: object
      required: [seeds]
      properties:
        seeds:
          type: array
          items: { $ref: "#/components/schemas/ReflectionItem" }
        iAm:
          oneOf: [{ $ref: "#/components/schemas/ReflectionItem" }, { type: "null" }]
        leadershipWhy:
          oneOf: [{ $ref: "#/components/schemas/ReflectionItem" }, { type: "null" }]
    JourneySegmentItem:
      type: object
      required: [key, label, state]
      properties:
        key: { type: string, enum: [BEGIN, EQ, IQ, INTERSESSION, MQ] }
        label: { type: string }
        state: { type: string, enum: [past, current, future] }
        # 0..1 position of the marker within the current segment.
        progress: { type: number, nullable: true }
    MirrorItem:
      type: object
      required: [sourceKind, label, body]
      properties:
        sourceKind: { $ref: "#/components/schemas/ReflectionKind" }
        # e.g. "Before tonight — from your Module 1 closing reflection"
        label: { type: string }
        body: { type: string }
        # Optional gentle follow-up, e.g. "Where did that show up this week?"
        question: { type: string, nullable: true }
    LiveItChecklistItem:
      type: object
      required: [id, order, label, checked]
      properties:
        id: { type: string }
        order: { type: integer }
        label: { type: string }
        checked: { type: boolean }
        note: { type: string, nullable: true }
        checkedAt: { type: string, format: date-time, nullable: true }
    LiveItState:
      type: object
      required: [moduleId, moduleTitle, moduleOrder, items]
      properties:
        moduleId: { type: string }
        moduleTitle: { type: string }
        moduleOrder: { type: integer }
        items:
          type: array
          items: { $ref: "#/components/schemas/LiveItChecklistItem" }
    PartnerState:
      type: object
      required: [name, checkedInThisWeek]
      properties:
        name: { type: string }
        # True when the partner lived at least one practice in the current
        # module window. Presence only — never what they wrote.
        checkedInThisWeek: { type: boolean }
        # A short presence line, e.g. "Maya lived one practice yesterday" or
        # "Maya booked her session for July 21".
        signal: { type: string, nullable: true }
        threadId: { type: string, nullable: true }
    PartnerCandidate:
      type: object
      required: [enrollmentId, name]
      properties:
        enrollmentId: { type: string }
        name: { type: string }
    ChoosePartnerRequest:
      type: object
      required: [enrollmentId]
      properties:
        enrollmentId: { type: string }
    PartnerNoteResult:
      type: object
      required: [ok, threadId]
      properties:
        ok: { type: boolean }
        threadId: { type: string }
    NowCard:
      type: object
      required: [type]
      properties:
        type:
          type: string
          enum: [PRE_START, SESSION, LIVE_IT, INTERSESSION, GRADUATION, CLOSED]
        # PRE_START — countdown + workbook
        cohortStartDate: { type: string, format: date-time, nullable: true }
        workbookUrl: { type: string, nullable: true }
        printStatus: { type: string, nullable: true }
        printRequestable: { type: boolean, nullable: true }
        # SESSION — the join card (lesson or practice)
        sessionKind: { type: string, enum: [LESSON, PRACTICE], nullable: true }
        moduleOrder: { type: integer, nullable: true }
        moduleTitle: { type: string, nullable: true }
        startAt: { type: string, format: date-time, nullable: true }
        endAt: { type: string, format: date-time, nullable: true }
        joinUrl: { type: string, nullable: true }
        isToday: { type: boolean, nullable: true }
        # INTERSESSION — the coaching booking card
        intersessionWeek: { type: integer, nullable: true }
        intersessionWeeks: { type: integer, nullable: true }
        booking:
          oneOf: [{ $ref: "#/components/schemas/BookingItem" }, { type: "null" }]
        # GRADUATION / CLOSED — the download window
        portalClosesAt: { type: string, format: date-time, nullable: true }
    PortalHomeState:
      type: object
      required: [segment, journey, journeyLabel, anchor, nowCard, needsOnboarding, prompts, cohortName]
      properties:
        segment:
          type: string
          enum: [PRE_START, SESSION_1, INTERSESSION, SESSION_2, GRADUATED, CLOSED]
        weekOfProgram: { type: integer, nullable: true }
        cyclePhase:
          type: string
          enum: [BEFORE_LESSON, LIVE_IT, BEFORE_PRACTICE, AFTER_PRACTICE]
          nullable: true
        currentModule:
          oneOf: [{ $ref: "#/components/schemas/ModuleLite" }, { type: "null" }]
        nowCard: { $ref: "#/components/schemas/NowCard" }
        journey:
          type: array
          items: { $ref: "#/components/schemas/JourneySegmentItem" }
        # The quiet position line, e.g. "EQ · Be Wise" or "Intersession · wk 3".
        journeyLabel: { type: string }
        anchor: { $ref: "#/components/schemas/PortalAnchor" }
        mirror:
          oneOf: [{ $ref: "#/components/schemas/MirrorItem" }, { type: "null" }]
        liveIt:
          oneOf: [{ $ref: "#/components/schemas/LiveItState" }, { type: "null" }]
        partner:
          oneOf: [{ $ref: "#/components/schemas/PartnerState" }, { type: "null" }]
        # True before the first practice session while unpartnered — the row
        # previews what is coming rather than sitting blank.
        partnerPending: { type: boolean, nullable: true }
        welcomeNote: { type: string, nullable: true }
        trainerName: { type: string, nullable: true }
        cohortName: { type: string }
